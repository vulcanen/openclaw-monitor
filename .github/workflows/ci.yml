name: CI

# Runs on every push to main and on every pull request targeting main.
# What we verify:
#   1. TypeScript compiles cleanly (backend + UI)
#   2. Vitest suite is green
#   3. Production build artifact builds (dist/) so publish-time surprises
#      get caught here instead of at `npm publish` time
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Stop in-flight runs when a newer commit lands on the same ref. Saves a
# few minutes when somebody pushes a fast follow-up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      # The committed .npmrc files pin the registry to npmmirror, which is
      # a public CN-located mirror of the npmjs upstream — reachable from
      # GitHub-hosted runners, fast for contributors in CN.
      - name: Install backend dependencies
        run: npm ci --no-audit --no-fund

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci --no-audit --no-fund

      - name: Typecheck (backend)
        run: npm run typecheck

      - name: Typecheck (UI)
        working-directory: ui
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (plugin + UI)
        run: npm run build
